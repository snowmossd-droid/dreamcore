name: Decompile AcoreAurora

on:
  workflow_dispatch:
    inputs:
      jar_path:
        description: 'Path tới jar trong repo'
        required: false
        default: 'dreamcore-1.0.0.jar'
jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Vineflower
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo Vineflower/vineflower --pattern "vineflower-*.jar" -D vf-download
          ls vf-download
          mv "$(ls vf-download/*.jar | grep -v slim | head -n1)" vineflower.jar

      - name: Decompile
        run: |
          mkdir -p decompiled
          java -jar vineflower.jar "${{ github.event.inputs.jar_path }}" decompiled/

      - name: Extract sources for review
        run: |
          cd decompiled
          unzip -o *.jar -d extracted
          find . -maxdepth 1 -name "*.jar" -delete

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dreamcore-decompiled
          path: decompiled/extracted
          retention-days: 7
